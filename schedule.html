                const GUEST_PREFIX = 'guest:';
                const GUEST_ADD_VALUE = `${GUEST_PREFIX}add`;
                const guestPickMap = new Map();
        const uuid4 = () => URL.createObjectURL(new Blob()).slice(-36);

                const maps = {

        const getNote = (p) => (p?.note ?? p?.remark ?? '');
        const escapeAttr = (v) => String(v ?? '').replace(/"/g, '&quot;');
        const encodeOriginal = (obj) => encodeURIComponent(JSON.stringify(obj || { }));
        const decodeOriginal = (str) => {
            try {
                return JSON.parse(decodeURIComponent(str || ''));
            } catch {
                return { };
            }
        };

        const fmtRegTime = (iso) => {
            if (!iso) return '';
                const d = new Date(iso);
                const Y = d.getFullYear();
                const M = String(d.getMonth() + 1).padStart(2, '0');
                const D = String(d.getDate()).padStart(2, '0');
                const h = String(d.getHours()).padStart(2, '0');
                const m = String(d.getMinutes()).padStart(2, '0');
                return `${Y}/${M}/${D} ${h}:${m}`;
        };

        const normalizeValue = (v) => {
            if (v === undefined || v === '') return null;
                return v;
        };

                function getRowOriginal(tr) {
            return decodeOriginal(tr.dataset.original || '');
        }

                function setRowOriginal(tr, payload) {
                    tr.dataset.original = encodeOriginal(payload);
        }

                function getRowCurrentPayload(tr, supervisor_id, uploadFlag) {
            const UNIQUE_KEYS_LOCAL = ['home_id', 'base1_id', 'base2_id', 'base3_id', 'recorder_id'];

                const payload = {
                    upload: !!uploadFlag,
                supervisor_id: normalizeValue(supervisor_id),
                remark: null,
                home_id: null,
                base1_id: null,
                base2_id: null,
                base3_id: null,
                recorder_id: null
            };

            UNIQUE_KEYS_LOCAL.forEach(k => {
                const sel = tr.querySelector(`select[name="${k}"]`);
                const v = sel ? (sel.value || null) : null;

                if (v && String(v).startsWith(GUEST_PREFIX)) {
                    payload[k] = null;
                } else {
                    payload[k] = normalizeValue(v);
                }
            });

                const remark = tr.querySelector('input[name="remark"]')?.value ?? null;
                payload.remark = (remark && remark.trim()) ? remark.trim() : null;

                return payload;
        }

                function isPayloadChanged(a, b) {
            const keys = ['home_id', 'base1_id', 'base2_id', 'base3_id', 'recorder_id', 'remark', 'supervisor_id', 'upload'];
            return keys.some(k => String(a?.[k] ?? '') !== String(b?.[k] ?? ''));
        }

                function attachNotePreview(selectEl) {
            const holder = document.createElement('div');
                holder.className = 'text-xs text-slate-600 mt-1 h-4';
            const update = () => {
                const opt = selectEl.options[selectEl.selectedIndex];
                const note = opt ? (opt.getAttribute('data-note') || '') : '';
                holder.textContent = note ? `${note}` : '';
            };
                selectEl.addEventListener('change', update);
                update();
                selectEl.parentElement.appendChild(holder);
        }

                function attachRegTimeOpenLabel(selectEl) {
            if (selectEl.dataset.regTimeBound === '1') return;
                selectEl.dataset.regTimeBound = '1';

            const applyOpenLabels = () => {
                    Array.from(selectEl.options).forEach(opt => {
                        const open = opt.getAttribute('data-open');
                        if (open) opt.textContent = open;
                    });
            };

            const applyClosedLabel = () => {
                const opt = selectEl.options[selectEl.selectedIndex];
                if (!opt) return;
                const nameOnly = opt.getAttribute('data-name');
                if (nameOnly) opt.textContent = nameOnly;
            };

                applyClosedLabel();

                selectEl.addEventListener('focus', applyOpenLabels);
                selectEl.addEventListener('mousedown', applyOpenLabels);
                selectEl.addEventListener('change', applyClosedLabel);
                selectEl.addEventListener('blur', applyClosedLabel);
        }

                function makePersonOptions(people, selectedId, withGuestAdd = true) {
            const opts = ['<option value=""></option>'];

            people.forEach(p => {
                const sel = String(p.id) === String(selectedId) ? 'selected' : '';
                const safeNote = escapeAttr(getNote(p) || '');
                const timeText = p.regTime ? fmtRegTime(p.regTime) : '';
                const labelOpen = timeText ? `${p.name} (${timeText})` : p.name;

                opts.push(
                `<option value="${p.id}" ${sel}
                    data-name="${escapeAttr(p.name)}"
                    data-open="${escapeAttr(labelOpen)}"

                (function applyGuestSelections() {
                const ROLE_KEYS = ['home_id', 'base1_id', 'base2_id', 'base3_id', 'recorder_id'];
                el.result.querySelectorAll('tbody tr[data-id]').forEach(tr => {
                    const matchId = tr.getAttribute('data-id');

                        });

                opt.value = `guest:${row.id || 'from-db'}`;
                opt.textContent = showName;

                if (addOpt) sel.insertBefore(opt, addOpt);
                else sel.appendChild(opt);

                sel.value = opt.value;
                sel.dispatchEvent(new Event('change'));
                    });
                });

                function updateRowOptionLocks(tr) {
                const chosen = new Set(
                    UNIQUE_KEYS.map(k => tr.querySelector(`select[name="${k}"]`)?.value).filter(Boolean)
                );
                const tbody = tr.closest('tbody');
                const dateId = tbody?.getAttribute('data-date');
                const rowTime = tr.getAttribute('data-time');
                const currentLocId = tr.getAttribute('data-loc');

                UNIQUE_KEYS.forEach(k => {
                    const select = tr.querySelector(`select[name="${k}"]`);
                if (!select) return;

                    Array.from(select.options).forEach(opt => opt.disabled = false);

                    Array.from(select.options).forEach(opt => {
                        if (!opt.value || String(opt.value).startsWith(GUEST_PREFIX)) return;

                const duplicateInRow = chosen.has(opt.value) && opt.value !== select.value;
                const crossVenue = hasCrossVenueConflict(dateId, opt.value, rowTime, currentLocId);

                if (duplicateInRow || crossVenue) {
                            if (opt.value !== select.value) opt.disabled = true;
                        }
                    });
                });
            }

                function attachUniqueHandlersToRow(tr) {
                const tbody = tr.closest('tbody');
                const dateId = tbody?.getAttribute('data-date');
                const rowTime = tr.getAttribute('data-time');
                const currentLocId = tr.getAttribute('data-loc');
                const matchId = tr.getAttribute('data-id');

                const handleGuestAdd = async (select, roleKey) => {
                    if (select.value !== GUEST_ADD_VALUE) return;

                const name = (await showInputModal({
                    title: '加入臨時人員',
                label: '輸入臨時人員姓名：',
                value: '',
                placeholder: '請輸入姓名'
                    }) || '').trim();

                if (!name) {
                    select.value = '';
                return;
                    }

                const note = (await showInputModal({
                    title: '加入臨時人員',
                label: '備註（可留空）：',
                value: '',
                placeholder: '可不填'
                    }) || '').trim();

                const gid = uuid4();
                const key = `${matchId}:${roleKey}`;
                guestPickMap.set(key, {id: gid, name, note });

                const opt = document.createElement('option');
                const showName = `*${name}`;

                opt.value = `${GUEST_PREFIX}${gid}`;
                opt.textContent = showName;
                opt.setAttribute('data-name', showName);
                opt.setAttribute('data-open', showName);
                opt.setAttribute('data-note', note);

                    const addOpt = Array.from(select.options).find(o => o.value === GUEST_ADD_VALUE);
                if (addOpt) select.insertBefore(opt, addOpt);
                else select.appendChild(opt);

                select.value = opt.value;
                markRowDirty(tr, true);
                updateRowOptionLocks(tr);
                select.dispatchEvent(new Event('change'));
                };

                UNIQUE_KEYS.forEach(k => {
                    const select = tr.querySelector(`select[name="${k}"]`);
                if (!select) return;

                    select.addEventListener('change', async () => {
                        if (select.value === GUEST_ADD_VALUE) {
                    await handleGuestAdd(select, k);
                return;
                        }

                const val = select.value || '';
                if (!val) {
                    markRowDirty(tr, true);
                updateRowOptionLocks(tr);
                return;
                        }

                if (!String(val).startsWith(GUEST_PREFIX)) {
                    let conflictAt = '';
                            UNIQUE_KEYS.forEach(other => {
                                if (other === k) return;
                const otherSel = tr.querySelector(`select[name="${other}"]`);
                if (otherSel && otherSel.value && otherSel.value === val) conflictAt = other;
                            });

                if (conflictAt) {
                    select.value = '';
                updateRowOptionLocks(tr);
                showToast('同一場的裁判/記錄不可重複。', 'warning');
                return;
                            }

                if (hasCrossVenueConflict(dateId, val, rowTime, currentLocId)) {
                    select.value = '';
                updateRowOptionLocks(tr);
                showToast(`同一天其他場地在 ${rowTime}（±${BUFFER_MIN} 分）已有該人員的指派。`, 'warning');
                return;
                            }
                        }

                markRowDirty(tr, true);
                updateRowOptionLocks(tr);
                    });

                attachRegTimeOpenLabel(select);
                });

                const remarkInput = tr.querySelector('input[name="remark"]');
                if (remarkInput) {
                    remarkInput.addEventListener('input', () => {
                        markRowDirty(tr, true);
                    });
                }

                updateRowOptionLocks(tr);
            }

            el.result.querySelectorAll('tbody tr[data-id]').forEach(tr => attachUniqueHandlersToRow(tr));

            el.result.querySelectorAll('.day-supervisor').forEach(sel => {

                    });
            });

                setTip(`查詢完成，共 ${rows.length} 場比賽。`, 'success');
        }

                function collectAssignmentsByPerson(groupEl) {
            const map = new Map();
                const trs = groupEl.querySelectorAll('tbody tr[data-id]');
                const ROLE_KEYS = ['home_id', 'base1_id', 'base2_id', 'base3_id', 'recorder_id'];

            trs.forEach((tr, rowIndex) => {

                        const value = sel.value || '';
                        if (!value || value.startsWith(GUEST_PREFIX)) return;

                        const opt = sel.options[sel.selectedIndex];
                        const displayName =
                            (opt?.getAttribute('data-name') || opt?.textContent || '').trim().replace(/^\*/, '');

                        if (!map.has(String(value))) {
                            map.set(String(value), {
                                id: String(value),
                                name: displayName,
                                rowIndexes: new Set()
                            });
                        }

                        map.get(String(value)).rowIndexes.add(rowIndex);
                    });
            });

                return map;
        }

                async function renderGroupAsPNG(dateId, locId, titleText, filenameBase, options = { }) {
            const {
                    highlightRows = new Set(),
                    download = false
                } = options;

                const groupEl = document.querySelector(`.group[data-date="${dateId}"][data-loc="${locId}"]`);
                if (!groupEl) throw new Error('找不到要輸出的班表區塊');

                const table = groupEl.querySelector('table');
                if (!table) throw new Error('這個班表沒有可輸出的內容');

                const supSel = groupEl.querySelector(`.day-supervisor[data-date="${dateId}"][data-loc="${locId}"]`);
            const supervisorText = (() => {
                if (!supSel) return '—';
                const opt = supSel.options[supSel.selectedIndex] || Array.from(supSel.options).find(o => o.selected) || null;
                const t = (opt && opt.textContent.trim()) ? opt.textContent.trim() : '';
                return t || '—';
            })();

            const getSelectDisplayText = (sel) => {
                if (!sel) return '';
                let txt = sel.options[sel.selectedIndex]?.textContent?.trim();
                if (!txt) {
                    const byAttr = Array.from(sel.options).find(o => o.selected);
                if (byAttr) txt = byAttr.textContent?.trim();
                }
                if (!txt) return '';
                return txt.replace(/^\*/, '');
            };

                const cleanTable = table.cloneNode(true);
                const origRows = table.querySelectorAll('tbody tr');
                const cloneRows = cleanTable.querySelectorAll('tbody tr');

            origRows.forEach((origTr, i) => {
                const cloneTr = cloneRows[i];
                if (!cloneTr) return;

                const origSelects = origTr.querySelectorAll('select');
                const cloneSelects = cloneTr.querySelectorAll('select');

                origSelects.forEach((origSel, j) => {
                    const cloneSel = cloneSelects[j];
                if (!cloneSel) return;
                cloneSel.value = origSel.value;
                });

                const origInputs = origTr.querySelectorAll('input');
                const cloneInputs = cloneTr.querySelectorAll('input');
                origInputs.forEach((origInp, j) => {
                    const cloneInp = cloneInputs[j];
                if (!cloneInp) return;
                cloneInp.value = origInp.value;
                });
            });

            cleanTable.querySelectorAll('tbody tr').forEach((tr, idx) => {
                const shouldHighlight = highlightRows.has(idx);

                if (shouldHighlight) {
                    tr.style.background = '#fde68a';
                } else if (idx % 2 === 1) {
                    tr.style.background = '#f8fbff';
                } else {
                    tr.style.background = '#ffffff';
                }

                tr.querySelectorAll('td').forEach(td => {
                    const sel = td.querySelector('select');
                const inp = td.querySelector('input');

                if (sel) {
                        const text = getSelectDisplayText(sel);
                td.innerHTML = `<span>${text}</span>`;
                td.style.background = shouldHighlight ? '#fde68a' : '';
                    } else if (inp) {
                    td.innerHTML = `<span>${(inp.value || '').trim()}</span>`;
                td.style.background = shouldHighlight ? '#fde68a' : '';
                    } else {
                    td.style.background = shouldHighlight ? '#fde68a' : '';
                    }
                });
            });

                const panel = document.createElement('div');
                Object.assign(panel.style, {
                    position: 'fixed',
                left: '-99999px',
                top: '0',
                zIndex: '2147483647',
                display: 'inline-block',
                width: 'auto',
                maxWidth: 'none',
                background: '#ffffff',
                borderRadius: '12px',
                boxShadow: '0 10px 30px rgba(0,0,0,0.08)',
                overflow: 'hidden',
                fontFamily: 'ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial',
                textAlign: 'center'
            });

                const header = document.createElement('div');
                header.textContent = (titleText || '班表').replace(/&quot;/g, '"');
                Object.assign(header.style, {
                    padding: '18px 20px',
                fontSize: '24px',
                fontWeight: '800',
                color: '#fff',
                background: 'linear-gradient(90deg,#2563eb,#1e40af)',
                lineHeight: '1.4'
            });
                panel.appendChild(header);

                const body = document.createElement('div');
                Object.assign(body.style, {
                    padding: '14px 18px 8px 18px',
                background: '#fff'
            });

                cleanTable.className = '';
                cleanTable.style.tableLayout = 'auto';
                cleanTable.style.width = 'auto';
                cleanTable.style.maxWidth = 'none';
                cleanTable.style.borderCollapse = 'collapse';
                cleanTable.style.margin = '0 auto';

            cleanTable.querySelectorAll('th, td').forEach(cell => {
                const isTH = cell.tagName === 'TH';
                cell.style.border = '1px solid #cfe0ff';
                cell.style.padding = '10px 14px';
                cell.style.fontSize = '18px';
                cell.style.fontWeight = '700';
                cell.style.textAlign = 'center';
                cell.style.verticalAlign = 'middle';
                cell.style.whiteSpace = 'nowrap';
                cell.style.color = '#0f172a';
                cell.style.lineHeight = '1.4';
                if (isTH) cell.style.background = '#eaf2ff';
            });

                body.appendChild(cleanTable);

                const footer = document.createElement('div');
                footer.textContent = `監場：${supervisorText}`;
                Object.assign(footer.style, {
                    padding: '12px 6px 16px 6px',
                fontSize: '18px',
                fontWeight: '700',
                color: '#1e3a8a',
                textAlign: 'center',
                lineHeight: '1.4'
            });
                body.appendChild(footer);

                panel.appendChild(body);
                document.body.appendChild(panel);
            await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

                try {
                const canvas = await html2canvas(panel, {
                    backgroundColor: '#ffffff',
                scale: Math.min(Math.max(window.devicePixelRatio || 2, 2), 3),
                allowTaint: true,
                useCORS: true,
                windowWidth: Math.ceil(panel.getBoundingClientRect().width) + 20,
                windowHeight: Math.ceil(panel.getBoundingClientRect().height) + 40,
                logging: false
                });

                const dataURL = canvas.toDataURL('image/png');
                const filenameSafe = (filenameBase || '班表')
                .replace(/[\\/:*?"<>|]/g, '_')
                    .replace(/\s+/g, '');

                    if (download) {
                    const a = document.createElement('a');
                    a.href = dataURL;
                    a.download = `${filenameSafe}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }

                    return {
                        dataURL,
                        filename: `${filenameSafe}.png`
                };
            } finally {
                        document.body.removeChild(panel);
            }
        }

                    async function saveOneGroup(dateId, locId, uploadFlag) {
                        showOverlay(uploadFlag ? '上傳中...' : '儲存中...', uploadFlag ? '系統正在上傳班表，請稍候' : '系統正在儲存資料，請稍候');
                    setTip(uploadFlag ? '上傳中，請稍候...' : '儲存中，請稍候...', 'warning');
                    setButtonsDisabled('.btn-save-day, .btn-upload-day', true);

                    const groupEl = el.result.querySelector(`.group[data-date="${dateId}"][data-loc="${locId}"]`);
                    if (!groupEl) {
                        hideOverlay();
                    setButtonsDisabled('.btn-save-day, .btn-upload-day', false);
                    showToast('找不到指定的表格', 'error');
                    return;
            }

                    const tbody = groupEl.querySelector(`tbody[data-date="${dateId}"][data-loc="${locId}"]`);
                    const supervisorSel = groupEl.querySelector(`.day-supervisor[data-date="${dateId}"][data-loc="${locId}"]`);
                    const supervisor_id = supervisorSel ? (supervisorSel.value || null) : null;

                    const trs = Array.from(tbody.querySelectorAll('tr[data-id]'));
                    const UNIQUE_KEYS_LOCAL = ['home_id', 'base1_id', 'base2_id', 'base3_id', 'recorder_id'];

                    for (const tr of trs) {
                const picks = [];
                UNIQUE_KEYS_LOCAL.forEach(k => {
                    const v = tr.querySelector(`select[name="${k}"]`)?.value || '';
                    if (v && !String(v).startsWith(GUEST_PREFIX)) picks.push({k, v});
                });

                    const seen = new Set();
                    for (const p of picks) {
                    if (seen.has(p.v)) {
                        hideOverlay();
                    setTip('同一場比賽的裁判不可重複指派，請先修正。', 'error');
                    setButtonsDisabled('.btn-save-day, .btn-upload-day', false);
                    showToast('同一場比賽的裁判不可重複指派（裁判/記錄需為不同人）。請先修正再儲存/上傳。', 'warning', 4200);
                    tr.querySelector(`select[name="${p.k}"]`)?.focus();
                    return;
                    }
                    seen.add(p.v);
                }
            }

                    const updates = [];
                    const changedRows = [];
                    const guestRows = [];
                    const guestDeleteTargets = [];

            trs.forEach(tr => {
                const matchId = String(tr.getAttribute('data-id'));
                    const currentPayload = getRowCurrentPayload(tr, supervisor_id, uploadFlag);
                    const originalPayload = getRowOriginal(tr);
                    const changed = isPayloadChanged(currentPayload, originalPayload);
                    const dirty = tr.dataset.dirty === '1';

                UNIQUE_KEYS_LOCAL.forEach(k => {
                    const sel = tr.querySelector(`select[name="${k}"]`);
                    const v = sel ? (sel.value || null) : null;
                    const key = `${matchId}:${k}`;

                    if (v && String(v).startsWith(GUEST_PREFIX)) {
                        const gp = guestPickMap.get(key);
                    if (gp && gp.name) {
                        guestRows.push({
                            match_id: matchId,
                            role: k,
                            guest_name: gp.name,
                            guest_note: gp.note || null,
                        });
                        }
                    } else {
                        guestDeleteTargets.push({ match_id: matchId, role: k });
                    }
                });

                    if (changed || dirty) {
                        updates.push({ id: matchId, payload: currentPayload, tr });
                    changedRows.push(tr);
                }
            });

                    if (updates.length === 0) {
                        hideOverlay();
                    setButtonsDisabled('.btn-save-day, .btn-upload-day', false);
                    setTip('沒有異動資料，不需要儲存。', 'info');
                    return;
            }

                    const updateResults = await Promise.all(
                updates.map(u => supabase.from('matches').update(u.payload).eq('id', u.id))
                    );

                    for (let i = 0; i < updateResults.length; i++) {
                const updRes = updateResults[i];
                    if (updRes.error) {
                        console.error('更新失敗 payload=', updates[i].payload, 'err=', updRes.error);
                    hideOverlay();
                    setTip('儲存失敗，請稍後再試', 'error');
                    setButtonsDisabled('.btn-save-day, .btn-upload-day', false);
                    showToast(`部分資料更新失敗（寫入 matches）。${updRes.error.message || ''}`, 'error', 4200);
                    return;
                }
            }

                    try {
                const changedMatchIds = Array.from(new Set(updates.map(u => String(u.id))));
                const changedDeleteTargets = guestDeleteTargets.filter(x => changedMatchIds.includes(String(x.match_id)));

                    for (const target of changedDeleteTargets) {
                        await supabase
                            .from('match_guest_assignments')
                            .delete()
                            .eq('match_id', target.match_id)
                            .eq('role', target.role);
                }
            } catch (e) {
                        console.warn('刪除舊臨時人員時例外（不影響 matches）：', e);
            }

                    if (guestRows.length) {
                try {
                    const changedMatchIds = Array.from(new Set(updates.map(u => String(u.id))));
                    const changedGuestRows = guestRows.filter(g => changedMatchIds.includes(String(g.match_id)));

                    if (changedGuestRows.length) {
                        const uniqKeys = new Set(changedGuestRows.map(g => `${g.match_id}:${g.role}`));
                    for (const key of uniqKeys) {
                            const [mid, role] = key.split(':');
                    await supabase
                    .from('match_guest_assignments')
                    .delete()
                    .eq('match_id', mid)
                    .eq('role', role);
                        }

                    const {error: insErr } = await supabase.from('match_guest_assignments').insert(changedGuestRows);
                    if (insErr) {
                        console.warn('寫入臨時人員失敗（不影響 matches）：', insErr);
                        }
                    }
                } catch (e) {
                        console.warn('寫入臨時人員時例外（不影響 matches）：', e);
                }
            }

            changedRows.forEach(tr => {
                const latestPayload = getRowCurrentPayload(tr, supervisor_id, uploadFlag);
                    setRowOriginal(tr, latestPayload);
                    markRowDirty(tr, false);
            });

                    refreshGroupUploadStatus(groupEl, uploadFlag);

                    hideOverlay();
                    showToast(uploadFlag ? '上傳完成！(已將本日裁判表上傳至裁判員頁面)' : '儲存/取消上傳成功！', 'success');
                    setTip(uploadFlag ? `上傳完成！本次同步 ${updates.length} 筆異動資料。` : `儲存完成！本次同步 ${updates.length} 筆異動資料。`, 'success');
                    setButtonsDisabled('.btn-save-day, .btn-upload-day', false);
        }

        el.result.addEventListener('click', (e) => {
            const saveBtn = e.target.closest('.btn-save-day');
                    if (saveBtn) {
                        saveOneGroup(saveBtn.dataset.date, saveBtn.dataset.loc, false);

            }

                    const uploadBtn = e.target.closest('.btn-upload-day');
                    if (uploadBtn) {

            }

                    const dlBtn = e.target.closest('.btn-download-pdf');

                    const filename = dlBtn.getAttribute('data-filename') || '班表';
                    downloadGroupAsPNG(did, lid, title, filename);
                    return;
            }

                    const mailBtn = e.target.closest('.btn-send-mail');
                    if (mailBtn) {
                const did = mailBtn.getAttribute('data-date');
                    const lid = mailBtn.getAttribute('data-loc');
                    const title = mailBtn.getAttribute('data-title') || '班表';
                    const filename = mailBtn.getAttribute('data-filename') || '班表';
                    sendScheduleMailToEachPerson(did, lid, title, filename);
                    return;
            }
        });

                    async function sendScheduleMailToEachPerson(dateId, locId, titleText, filenameBase) {
            if (sendScheduleMailToEachPerson.__busy) return;
                    sendScheduleMailToEachPerson.__busy = true;
                    setButtonsDisabled('.btn-send-mail', true);

                    try {
                const groupEl = document.querySelector(`.group[data-date="${dateId}"][data-loc="${locId}"]`);
                    if (!groupEl) {
                        setTip('找不到班表。', 'error');
                    showToast('找不到班表', 'error');
                    return;
                }

                    const assignmentMap = collectAssignmentsByPerson(groupEl);
                    const personIds = Array.from(assignmentMap.keys());

                    if (!personIds.length) {
                        setTip('這張班表目前沒有已排到的人員。', 'info');
                    showToast('這張班表目前沒有已排到的人員', 'info');
                    return;
                }

                    showOverlay('寄送通知中...', '系統會逐一產生班表並寄送給裁判，請稍候');
                    setTip('寄送通知中，請稍候，系統會逐一寄給裁判...', 'warning');

                    const {data: profiles, error: profileErr } = await supabase
                    .from('profiles')
                    .select('id, name, email')
                    .in('id', personIds);

                    if (profileErr) throw profileErr;

                    const profileMap = new Map();
                (profiles || []).forEach(p => profileMap.set(String(p.id), p));

                    let okCount = 0;
                    let failCount = 0;
                    let skipCount = 0;

                    for (const personId of personIds) {
                    const assignInfo = assignmentMap.get(String(personId));
                    const profile = profileMap.get(String(personId));

                    if (!profile || !profile.email) {
                        skipCount++;
                    continue;
                    }

                    const personName = profile.name || assignInfo?.name || '裁判';
                    const highlightRows = assignInfo?.rowIndexes || new Set();

                    showOverlay(
                    `寄送中：${personName}`,
                    '系統正在產生該裁判的班表圖片並寄出',
                    `(${okCount + failCount + 1} / ${personIds.length})`
                    );

                    const {dataURL, filename} = await renderGroupAsPNG(
                    dateId,
                    locId,
                    titleText,
                    `${filenameBase}-${personName}`,
                    {
                        highlightRows,
                        download: false
                        }
                    );

                    const body = {
                        to: profile.email,
                    name: personName,
                    subject: `裁判排班通知｜${String(titleText || '班表').replace(/&quot;/g, '"')}`,
                    imageBase64: dataURL.split(',')[1],
                    filename,
                    titleText: String(titleText || '班表').replace(/&quot;/g, '"')
                    };

                    const {data, error} = await supabase.functions.invoke('send-schedule-mail', {
                        body
                    });

                    if (error || data?.error) {
                        console.error(`寄給 ${personName} 失敗`, error || data?.error);
                    failCount++;
                    } else {
                        okCount++;
                    }
                }

                    hideOverlay();

                if (okCount > 0 && failCount === 0) {
                    const msg = `通知寄送完成！成功 ${okCount} 封，臨時人員、監場${skipCount ? `、${skipCount} 位無 Email 人員` : '未寄出通知信'}`;
                    showToast(msg, 'success', 4200);
                    setTip(msg, 'success');
                } else if (okCount > 0 && failCount > 0) {
                    const msg = `部分寄送完成：成功 ${okCount} 封，失敗 ${failCount} 封${skipCount ? `，略過 ${skipCount} 位無 Email 人員` : ''}`;
                    setTip(msg, 'warning');
                    showToast(msg, 'warning', 4200);
                } else {
                    const msg = `沒有成功寄出通知${skipCount ? `（略過 ${skipCount} 位無 Email 人員）` : ''}`;
                    setTip(msg, 'error');
                    showToast(msg, 'error', 4200);
                }
            } catch (err) {
                console.error(err);
                hideOverlay();
                const msg = '寄送通知失敗：' + (err.message || err);
                setTip(msg, 'error');
                showToast(msg, 'error', 4200);
            } finally {
                sendScheduleMailToEachPerson.__busy = false;
                setButtonsDisabled('.btn-send-mail', false);
            }
        }
    });

                const cfg = styles[type] || styles.info;
                const toast = document.createElement('div');
                toast.className = `pointer-events-auto w-[320px] max-w-[calc(100vw-2rem)] rounded-2xl border shadow-xl ${cfg.wrap} overflow-hidden transition-all duration-300 opacity-0 translate-y-[-8px]`;

                                        <i class="fas fa-xmark"></i>
                                    </button>
                                </div>

                ui.toastContainer.appendChild(toast);

            requestAnimationFrame(() => {
                    toast.classList.remove('opacity-0', 'translate-y-[-8px]');

            const removeToast = () => {
                    toast.classList.add('opacity-0', 'translate-y-[-8px]');
                setTimeout(() => toast.remove(), 220);
            };

                toast.querySelector('.toast-close').addEventListener('click', removeToast);

            if (duration > 0) {

                const D = String(d.getDate()).padStart(2, '0');
                const h = String(d.getHours()).padStart(2, '0');

                                                <select id="q-loc" class="w-full border border-blue-300 rounded-lg px-4 py-2 bg-white text-blue-900">
                                                    <option value="">載入中...</option>
                                                </select>
                                            </div>
                                            <div class="flex sm:block">
                                                <button id="btn-query" class="w-full px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
                                                    查詢
                                                </button>
                                            </div>
                                        </div>

                                        <div id="search-tip" class="text-sm mt-2"></div>
                                        <div id="search-result" class="mt-6 space-y-8"></div>
                                    </div>

                                    <div id="match-tip" class="text-sm text-blue-700 mt-2"></div>

                                    <div id="delete-modal" class="fixed inset-0 z-[9999] hidden">
                                        <div id="delete-modal-backdrop" class="absolute inset-0 bg-black/40"></div>

                                        <div class="absolute inset-0 flex items-center justify-center p-4">
                                            <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden">
                                                <div class="px-6 py-4 border-b bg-red-50">
                                                    <h4 class="text-lg font-bold text-red-700">確認刪除</h4>
                                                </div>

                                                <div class="px-6 py-5">
                                                    <div class="flex items-start gap-3">
                                                        <div class="shrink-0 w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center">
                                                            <i class="fas fa-trash-alt"></i>
                                                        </div>
                                                        <div class="min-w-0">
                                                            <p class="font-semibold text-gray-800 mb-2">你確定要刪除這筆賽程嗎？</p>
                                                            <pre id="delete-modal-text" class="whitespace-pre-wrap break-words text-sm text-gray-600 leading-6 font-sans"></pre>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3">
                                                    <button id="delete-modal-cancel"
                                                        class="px-4 py-2 rounded-lg border border-gray-300 bg-white text-gray-700 hover:bg-gray-100 transition">
                                                        取消
                                                    </button>
                                                    <button id="delete-modal-confirm"
                                                        class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition">
                                                        確定刪除
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div id="toast-container" class="fixed top-4 right-4 z-[10000] flex flex-col gap-3 pointer-events-none"></div>
                                `;

            const el = {
                title: document.getElementById('match-form-title'),
                form: document.getElementById('match-form'),
                games: document.getElementById('games-select'),
                date: document.getElementById('date-select'),
                loc: document.getElementById('loc-select'),
                session: document.getElementById('session-input'),
                time: document.getElementById('time-input'),
                team1: document.getElementById('team1-select'),
                team2: document.getElementById('team2-select'),
                tip: document.getElementById('match-tip'),

                qDate: document.getElementById('q-date'),
                qLoc: document.getElementById('q-loc'),
                btnQuery: document.getElementById('btn-query'),
                searchTip: document.getElementById('search-tip'),
                searchResult: document.getElementById('search-result'),

                deleteModal: document.getElementById('delete-modal'),
                deleteModalBackdrop: document.getElementById('delete-modal-backdrop'),
                deleteModalText: document.getElementById('delete-modal-text'),
                deleteModalCancel: document.getElementById('delete-modal-cancel'),
                deleteModalConfirm: document.getElementById('delete-modal-confirm'),

                toastContainer: document.getElementById('toast-container'),
            };

            const maps = {
                games: new Map(),
                dates: new Map(),
                datesLabel: new Map(),
                locs: new Map(),
                teams: new Map(),
                profiles: new Map(),
            };

            const LS_MATCH_DEFAULTS = 'match_new_defaults';

            function saveMatchDefaults({ games_id, match_dates_id, locations_id }) {
                const payload = {
                    games_id: String(games_id || ''),
                    match_dates_id: String(match_dates_id || ''),
                    locations_id: String(locations_id || ''),
                };
                localStorage.setItem(LS_MATCH_DEFAULTS, JSON.stringify(payload));
            }

            function loadMatchDefaults() {
                try {
                    const raw = localStorage.getItem(LS_MATCH_DEFAULTS);
                    return raw ? JSON.parse(raw) : null;
                } catch {
                    return null;
                }
            }

            let currentEditId = null;
            let deleteResolver = null;

            function showToast(message, type = 'info', duration = 2600) {
                const styles = {
                    success: {
                        wrap: 'border-green-200 bg-green-50',
                        iconBg: 'bg-green-100 text-green-600',
                        title: 'text-green-800',
                        text: 'text-green-700',
                        icon: 'fa-check'
                    },
                    error: {
                        wrap: 'border-red-200 bg-red-50',
                        iconBg: 'bg-red-100 text-red-600',
                        title: 'text-red-800',
                        text: 'text-red-700',
                        icon: 'fa-circle-xmark'
                    },
                    warning: {
                        wrap: 'border-yellow-200 bg-yellow-50',
                        iconBg: 'bg-yellow-100 text-yellow-600',
                        title: 'text-yellow-800',
                        text: 'text-yellow-700',
                        icon: 'fa-triangle-exclamation'
                    },
                    info: {
                        wrap: 'border-blue-200 bg-blue-50',
                        iconBg: 'bg-blue-100 text-blue-600',
                        title: 'text-blue-800',
                        text: 'text-blue-700',
                        icon: 'fa-circle-info'
                    }
                };

                const cfg = styles[type] || styles.info;
                const toast = document.createElement('div');
                toast.className = `pointer-events-auto w-[320px] max-w-[calc(100vw-2rem)] rounded-2xl border shadow-xl ${cfg.wrap} overflow-hidden transition-all duration-300 opacity-0 translate-y-[-8px]`;

                toast.innerHTML = `
                                <div class="p-4">
                                    <div class="flex items-start gap-3">
                                        <div class="shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${cfg.iconBg}">
                                            <i class="fas ${cfg.icon}"></i>
                                        </div>
                                        <div class="min-w-0 flex-1">
                                            <div class="font-semibold ${cfg.title} mb-1">
                                                ${type === 'success' ? '成功' : type === 'error' ? '失敗' : type === 'warning' ? '提醒' : '通知'}
                                            </div>
                                            <div class="text-sm leading-6 ${cfg.text} whitespace-pre-wrap break-words">${message}</div>
                                        </div>
                                        <button class="toast-close shrink-0 text-gray-400 hover:text-gray-600 transition">
                                            <i class="fas fa-xmark"></i>
                                        </button>
                                    </div>
                                </div>
                            `;

                el.toastContainer.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.classList.remove('opacity-0', 'translate-y-[-8px]');
                });

                const removeToast = () => {
                    toast.classList.add('opacity-0', 'translate-y-[-8px]');
                    setTimeout(() => toast.remove(), 220);
                };

                toast.querySelector('.toast-close').addEventListener('click', removeToast);

                if (duration > 0) {
                    setTimeout(removeToast, duration);
                }
            }

            function loadingHTML() {
                return `
                        <div class="inline-flex items-center gap-2 text-blue-600 font-semibold">
                            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-90" fill="currentColor" d="M12 2a10 10 0 0 1 10 10h-4a6 6 0 0 0-6-6V2z"></path>
                            </svg>
                            <span>查詢中...</span>
                        </div>
                    `;
            }

            function showDeleteModal(message) {
                el.deleteModalText.textContent = message || '';
                el.deleteModal.classList.remove('hidden');
                return new Promise((resolve) => {
                    deleteResolver = resolve;
                });
            }

            function closeDeleteModal(result = false) {
                el.deleteModal.classList.add('hidden');
                if (deleteResolver) {
                    deleteResolver(result);
                    deleteResolver = null;
                }
            }

            el.deleteModalCancel.addEventListener('click', () => closeDeleteModal(false));
            el.deleteModalBackdrop.addEventListener('click', () => closeDeleteModal(false));
            el.deleteModalConfirm.addEventListener('click', () => closeDeleteModal(true));

            function exitEditMode() {
                currentEditId = null;
                el.title.textContent = '新增賽程';
                el.form.reset();
                el.games.dispatchEvent(new Event('change'));

                const submitBtn = el.form.querySelector('button[type="submit"]');
                if (submitBtn) submitBtn.textContent = '新增賽程';

                const cancelBtn = document.getElementById('btn-cancel-edit');
                if (cancelBtn) cancelBtn.remove();
            }

            async function fillFormFromMatch(row) {
                el.title.textContent = '修改賽程';

                el.games.value = row.games_id || '';
                await loadTeamsByGame(el.games.value);

                el.date.value = row.match_dates_id || '';
                el.loc.value = row.locations_id || '';
                el.session.value = row.session || '';
                el.time.value = (row.time || '').slice(0, 5);
                el.team1.value = row.teams_id1 || '';
                el.team2.value = row.teams_id2 || '';

                const submitBtn = el.form.querySelector('button[type="submit"]');
                if (submitBtn) submitBtn.textContent = '儲存修改';

                if (!document.getElementById('btn-cancel-edit')) {
                    const cancelBtn = document.createElement('button');
                    cancelBtn.id = 'btn-cancel-edit';
                    cancelBtn.type = 'button';
                    cancelBtn.className = 'px-4 py-2 border rounded hover:bg-blue-50 transition';
                    cancelBtn.textContent = '取消修改';
                    submitBtn.parentElement.prepend(cancelBtn);
                    cancelBtn.addEventListener('click', exitEditMode);
                }
            }

            async function loadStaticOptions() {
                el.tip.textContent = '載入選單中...';

                const [gamesRes, datesRes, locsRes] = await Promise.all([
                    supabase.from('games').select('id, name').order('name', { ascending: true }),
                    supabase.from('match_dates').select('id, date').order('date', { ascending: true }),
                    supabase.from('locations').select('id, name').order('name', { ascending: true })
                ]);

                if (gamesRes.error) {
                    el.games.innerHTML = `<option value="">載入賽事失敗</option>`;
                    console.error(gamesRes.error);
                    showToast('載入賽事失敗，請稍後再試', 'error');
                } else {
                    const opts = gamesRes.data || [];
                    el.games.innerHTML = `<option value="">請選擇賽事</option>` +
                        opts.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
                    maps.games.clear();
                    opts.forEach(g => maps.games.set(String(g.id), g.name));
                }

                if (datesRes.error) {
                    el.date.innerHTML = `<option value="">載入日期失敗</option>`;
                    el.qDate.innerHTML = `<option value="">載入日期失敗</option>`;
                    console.error(datesRes.error);
                    showToast('載入日期失敗，請稍後再試', 'error');
                } else {
                    const opts = datesRes.data || [];
                    const dateOptions = opts.map(d => {
                        const iso = String(d.date).slice(0, 10);
                        const label = new Date(d.date).toLocaleDateString('zh-TW', {
                            year: 'numeric',
                            month: '2-digit',
                            day: '2-digit',
                            weekday: 'short'
                        });
                        maps.dates.set(String(d.id), iso);
                        maps.datesLabel.set(String(d.id), label);
                        return `<option value="${d.id}">${label}</option>`;
                    }).join('');

                    el.date.innerHTML = `<option value="">請選擇日期</option>` + dateOptions;
                    el.qDate.innerHTML = `<option value="">請選擇日期</option>` + dateOptions;
                }

                if (locsRes.error) {
                    el.loc.innerHTML = `<option value="">載入地點失敗</option>`;
                    el.qLoc.innerHTML = `<option value="">載入地點失敗</option>`;
                    console.error(locsRes.error);
                    showToast('載入地點失敗，請稍後再試', 'error');
                } else {
                    const opts = locsRes.data || [];
                    el.loc.innerHTML = `<option value="">請選擇地點</option>` +
                        opts.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
                    el.qLoc.innerHTML = `<option value="">全部地點</option>` +
                        opts.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
                    maps.locs.clear();
                    opts.forEach(l => maps.locs.set(String(l.id), l.name));
                }

                await applySavedDefaults();
                applySavedDefaultsToQuery();
                el.tip.textContent = '';
            }

            async function loadTeamsByGame(gameId) {
                if (!gameId) {
                    el.team1.innerHTML = `<option value="">請先選擇賽事</option>`;
                    el.team2.innerHTML = `<option value="">請先選擇賽事</option>`;
                    return;
                }

                const { data, error } = await supabase
                    .from('teams')
                    .select('id, name')
                    .eq('games_id', gameId)
                    .order('name', { ascending: true });

                if (error) {
                    console.error(error);
                    el.team1.innerHTML = `<option value="">載入隊伍失敗</option>`;
                    el.team2.innerHTML = `<option value="">載入隊伍失敗</option>`;
                    showToast('載入隊伍失敗，請稍後再試', 'error');
                    return;
                }

                const options = `<option value="">（可留空）</option>` +
                    (data || []).map(t => `<option value="${t.id}">${t.name}</option>`).join('');

                el.team1.innerHTML = options;
                el.team2.innerHTML = options;

                maps.teams.clear();
                (data || []).forEach(t => maps.teams.set(String(t.id), t.name));
            }

            async function applySavedDefaults() {
                const d = loadMatchDefaults();
                if (!d) return;

                if (d.games_id && el.games.querySelector(`option[value="${d.games_id}"]`)) {
                    el.games.value = d.games_id;
                    await loadTeamsByGame(d.games_id);
                } else {
                    return;
                }

                if (d.match_dates_id && el.date.querySelector(`option[value="${d.match_dates_id}"]`)) {
                    el.date.value = d.match_dates_id;
                }
                if (d.locations_id && el.loc.querySelector(`option[value="${d.locations_id}"]`)) {
                    el.loc.value = d.locations_id;
                }
            }

            function applySavedDefaultsToQuery() {
                const d = loadMatchDefaults();
                if (!d) {
                    el.qLoc.value = '';
                    return;
                }

                if (d.match_dates_id && el.qDate.querySelector(`option[value="${d.match_dates_id}"]`)) {
                    el.qDate.value = d.match_dates_id;
                }

                el.qLoc.value = '';
            }

            async function runMatchQuery() {
                const dateId = el.qDate.value;
                const locId = el.qLoc.value;

                if (!dateId) {
                    el.searchTip.innerHTML = `<span class="text-gray-500">請先選擇日期</span>`;
                    el.searchResult.innerHTML = '';
                    return;
                }

                el.searchTip.innerHTML = loadingHTML();
                el.searchResult.innerHTML = '';

                let query = supabase
                    .from('matches')
                    .select('id, games_id, match_dates_id, locations_id, session, time, teams_id1, teams_id2')
                    .eq('match_dates_id', dateId);

                if (locId) {
                    query = query.eq('locations_id', locId);
                }

                const { data: rows, error } = await query.order('time', { ascending: true });

                if (error) {
                    console.error(error);
                    el.searchTip.innerHTML = `<span class="text-red-600 font-semibold">查詢失敗，請稍後再試</span>`;
                    showToast('查詢失敗，請稍後再試', 'error');
                    return;
                }

                if (!rows || rows.length === 0) {
                    el.searchTip.innerHTML = `<span class="text-orange-600 font-semibold">沒有符合的賽程</span>`;
                    el.searchResult.innerHTML = '';
                    return;
                }

                const teamIds = new Set();
                rows.forEach(r => {
                    if (r.teams_id1) teamIds.add(r.teams_id1);
                    if (r.teams_id2) teamIds.add(r.teams_id2);
                });

                if (teamIds.size > 0) {
                    const { data: teamList, error: teamErr } = await supabase
                        .from('teams')
                        .select('id, name')
                        .in('id', Array.from(teamIds));

                    if (!teamErr && teamList) {
                        teamList.forEach(t => maps.teams.set(String(t.id), t.name));
                    }
                }

                const byLocation = {};
                rows.forEach(r => {
                    const locName = maps.locs.get(String(r.locations_id)) || '未知地點';
                    if (!byLocation[locName]) byLocation[locName] = [];
                    byLocation[locName].push(r);
                });

                const dateLabel = maps.datesLabel.get(String(dateId)) || '未知日期';
                const locKeys = Object.keys(byLocation).sort((a, b) => a.localeCompare(b, 'zh-Hant'));

                el.searchResult.innerHTML = locKeys.map(locName => {
                    const locRows = byLocation[locName].sort((a, b) => (a.time || '').localeCompare(b.time || ''));

                    const rowsHtml = locRows.map(r => {
                        const gameName = maps.games.get(String(r.games_id)) || '-';
                        const t1 = maps.teams.get(String(r.teams_id1)) || '-';
                        const t2 = maps.teams.get(String(r.teams_id2)) || '-';
                        const time = r.time || '-';
                        const session = r.session || '-';

                        const confirmText = `確定刪除：
                                            日期：${dateLabel}
                                            賽事：${gameName}
                                            地點：${locName}
                                            時間：${time}
                                            場次：${session}
                                            對戰：${t1} vs ${t2}
                                            此操作無法復原。`;

                        return `
                            <tr data-id="${r.id}" class="hover:bg-blue-50/40 transition">
                                <td class="border px-3 py-2 text-center">${session}</td>
                                <td class="border px-3 py-2 text-center whitespace-nowrap">${time}</td>
                                <td class="border px-3 py-2 text-center">${gameName}</td>
                                <td class="border px-3 py-2 text-center">${t1}</td>
                                <td class="border px-3 py-2 text-center">vs</td>
                                <td class="border px-3 py-2 text-center">${t2}</td>
                                <td class="border px-3 py-2 text-center">
                                    <div class="flex items-center justify-center gap-2">
                                        <button
                                            class="btn-edit-match inline-flex items-center justify-center w-9 h-9 rounded-full bg-blue-100 text-blue-700 hover:bg-blue-200 hover:scale-110 hover:shadow transition duration-150"
                                            title="修改"
                                            data-id="${r.id}">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button
                                            class="btn-del-match inline-flex items-center justify-center w-9 h-9 rounded-full bg-red-100 text-red-700 hover:bg-red-200 hover:scale-110 hover:shadow transition duration-150"
                                            title="刪除"
                                            data-id="${r.id}"
                                            data-confirm="${confirmText.replace(/"/g, '&quot;')}">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');

                    return `
                        <div class="rounded-xl border border-blue-300 overflow-hidden shadow-sm">
                            <div class="bg-blue-50 px-4 py-3 font-semibold text-center">
                                ${dateLabel} ｜ 地點：${locName}
                            </div>
                            <div class="overflow-x-auto max-h-[420px]">
                                <table class="w-full text-sm bg-white text-center border-collapse">
                                    <thead class="bg-blue-100 text-blue-800 sticky top-0 z-10 shadow-sm">
                                        <tr>
                                            <th class="border px-3 py-2 text-center">場次</th>
                                            <th class="border px-3 py-2 text-center">時間</th>
                                            <th class="border px-3 py-2 text-center">賽事</th>
                                            <th class="border px-3 py-2 text-center">先攻</th>
                                            <th class="border px-3 py-2 text-center">VS</th>
                                            <th class="border px-3 py-2 text-center">後攻</th>
                                            <th class="border px-3 py-2 text-center">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${rowsHtml}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }).join('');

                el.searchResult.querySelectorAll('.btn-del-match').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-id');
                        const msg = btn.getAttribute('data-confirm') || '確定刪除？此操作無法復原。';

                        const ok = await showDeleteModal(msg);
                        if (!ok) return;

                        const { error: delErr } = await supabase.from('matches').delete().eq('id', id);
                        if (delErr) {
                            console.error(delErr);
                            showToast('刪除失敗，請稍後再試', 'error');
                        } else {
                            showToast('刪除成功！', 'success');
                            await runMatchQuery();
                        }
                    });
                });

                el.searchResult.querySelectorAll('.btn-edit-match').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-id');
                        const { data, error } = await supabase
                            .from('matches')
                            .select('id, games_id, match_dates_id, locations_id, session, time, teams_id1, teams_id2')
                            .eq('id', id)
                            .single();

                        if (error || !data) {
                            console.error(error);
                            showToast('讀取資料失敗，請稍後再試', 'error');
                            return;
                        }

                        currentEditId = id;
                        await fillFormFromMatch(data);
                        el.form.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                });

                el.searchTip.innerHTML = `<span class="text-green-600 font-semibold">共 ${rows.length} 場比賽</span>`;
            }

            el.games.addEventListener('change', async () => {
                await loadTeamsByGame(el.games.value);
            });

            el.form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const base = {
                    games_id: el.games.value || null,
                    match_dates_id: el.date.value || null,
                    locations_id: el.loc.value || null,
                    session: (el.session.value || '').trim(),
                    time: el.time.value || null,
                    teams_id1: el.team1.value || null,
                    teams_id2: el.team2.value || null,
                };

                if (!base.games_id) {
                    showToast('請選擇賽事', 'warning');
                    return;
                }
                if (!base.match_dates_id) {
                    showToast('請選擇日期', 'warning');
                    return;
                }
                if (!base.locations_id) {
                    showToast('請選擇地點', 'warning');
                    return;
                }
                if (!base.session) {
                    showToast('請輸入場次編號', 'warning');
                    return;
                }
                if (!base.time) {
                    showToast('請選擇時間', 'warning');
                    return;
                }

                if (base.teams_id1 && base.teams_id2 && base.teams_id1 === base.teams_id2) {
                    showToast('先攻與後攻隊伍不可相同', 'warning');
                    return;
                }

                const filledTeamIds = [base.teams_id1, base.teams_id2].filter(Boolean);
                if (filledTeamIds.length > 0) {
                    const { data: chkTeams, error: chkErr } = await supabase
                        .from('teams')
                        .select('id, games_id')
                        .in('id', filledTeamIds);

                    if (chkErr) {
                        console.error(chkErr);
                        showToast('驗證隊伍所屬賽事失敗，請稍後再試', 'error');
                        return;
                    }

                    if (!Array.isArray(chkTeams) || chkTeams.length !== filledTeamIds.length) {
                        showToast('隊伍清單驗證失敗，請重新選擇隊伍', 'warning');
                        return;
                    }

                    const allMatchGame = chkTeams.every(t => String(t.games_id) === String(base.games_id));
                    if (!allMatchGame) {
                        showToast('所選隊伍不屬於此賽事，請重新選擇', 'warning');
                        return;
                    }
                }

                if (currentEditId) {
                    const patch = {
                        games_id: base.games_id,
                        match_dates_id: base.match_dates_id,
                        locations_id: base.locations_id,
                        session: base.session,
                        time: base.time,
                        teams_id1: base.teams_id1,
                        teams_id2: base.teams_id2,
                    };

                    const { error: updErr } = await supabase
                        .from('matches')
                        .update(patch)
                        .eq('id', currentEditId);

                    if (updErr) {
                        console.error(updErr);
                        showToast('更新失敗，請稍後再試', 'error');
                    } else {
                        showToast('更新成功！', 'success');
                        exitEditMode();
                        if (el.qDate.value) await runMatchQuery();
                    }
                } else {
                    const payloadInsert = {
                        ...base,
                        home_id: null,
                        base1_id: null,
                        base2_id: null,
                        base3_id: null,
                        recorder_id: null,
                        supervisor_id: null,
                        remark: null,
                        upload: false,
                    };

                    const { error: insErr } = await supabase.from('matches').insert(payloadInsert);
                    if (insErr) {
                        console.error(insErr);
                        showToast('新增賽程失敗，請稍後再試', 'error');
                    } else {
                        showToast('賽程新增成功！', 'success');

                        saveMatchDefaults({
                            games_id: el.games.value,
                            match_dates_id: el.date.value,
                            locations_id: el.loc.value,
                        });

                        el.session.value = '';
                        el.time.value = '';
                        el.team1.value = '';
                        el.team2.value = '';
                        el.session.focus();

                        if (el.qDate.value && String(el.qDate.value) === String(base.match_dates_id)) {
                            await runMatchQuery();
                        }
                    }
                }
            });

            el.btnQuery.addEventListener('click', async () => {
                await runMatchQuery();
            });

            el.qDate.addEventListener('change', async () => {
                await runMatchQuery();
            });

            el.qLoc.addEventListener('change', async () => {
                if (!el.qDate.value) return;
                await runMatchQuery();
            });

            await loadStaticOptions();
        });

    document.getElementById('logout-btn').addEventListener('click', function () {
        localStorage.removeItem('profile');
        window.location.href = 'index.html';
    });

    document.getElementById('btn-schedule').click();
</script>

</html>
